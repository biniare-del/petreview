<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>케어 – 우쭈쭈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="/petreview/manifest.json"/>
  <meta name="theme-color" content="#16a34a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="우쭈쭈"/>
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg"/>
</head>
<body class="has-tabbar care-page">

  <header class="care-header">
    <div class="care-header-left">
      <div class="logo-icon" style="font-size:18px;">🐾</div>
      <div>
        <h1 class="care-header-title">케어</h1>
        <p class="care-header-sub">반려동물 건강 관리 스케줄</p>
      </div>
    </div>
    <button class="care-history-btn" id="care-history-btn" hidden>📋 기록</button>
  </header>

  <!-- 서브탭 -->
  <div class="care-subtabs" id="care-subtabs">
    <button class="care-subtab is-active" data-subtab="care">🩺 케어</button>
    <button class="care-subtab" data-subtab="diet">🍚 식단</button>
  </div>

  <div id="care-content" class="care-content"></div>

  <!-- 하단 탭바 -->
  <nav class="bottom-tab-bar" aria-label="하단 탭 메뉴">
    <button class="tab-item is-active" aria-label="케어">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1" ry="1"/><path d="M9 12l2 2 4-4"/></svg>
      <span>케어</span>
    </button>
    <button class="tab-item" onclick="location.href='index.html'" aria-label="커뮤니티">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>커뮤니티</span>
    </button>
    <button class="tab-item tab-item--write" onclick="location.href='index.html?action=write'" aria-label="후기쓰기">
      <div class="write-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <span>후기쓰기</span>
    </button>
    <button class="tab-item" onclick="location.href='brag.html'" aria-label="오늘의 펫">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>오늘의 펫</span>
    </button>
    <button class="tab-item" onclick="location.href='mypage.html'" aria-label="마이">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>마이</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script src="care.js" defer></script>
</body>
</html>
