<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>우쭈쭈 – 우리아이 케어관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link rel="preconnect" href="https://hguzornmqxayylmagook.supabase.co"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="/petreview/manifest.json"/>
  <meta name="theme-color" content="#16a34a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="우쭈쭈"/>
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg"/>
</head>
<body class="care-page">

  <header class="site-header">
    <div class="logo-area">
      <div class="logo-icon">🐾</div>
      <div class="logo-text"><h1>우쭈쭈</h1></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="header-auth" id="header-auth">
        <button class="auth-login-btn" id="care-login-btn" hidden onclick="location.href='hospital.html'">로그인</button>
      </div>
    </div>
  </header>

  <!-- 서브탭 -->
  <div class="care-subtabs" id="care-subtabs" hidden>
    <button class="care-subtab is-active" data-subtab="manage">🐾 루틴</button>
    <button class="care-subtab" data-subtab="records">📋 건강기록</button>
    <button class="care-subtab" data-subtab="diet" hidden>🍚 식습관</button>
    <button class="care-subtab" data-subtab="expense" hidden>💰 집사영수증</button>
  </div>

  <div id="care-content" class="care-content"></div>

  <!-- 케어 항목 하단 시트 -->
  <div class="care-sheet-overlay" id="care-sheet-overlay" role="dialog" aria-modal="true" aria-labelledby="care-sheet-title">
    <div class="care-sheet" id="care-sheet">
      <div class="care-sheet-handle"></div>
      <div class="care-sheet-header">
        <div class="care-sheet-title-row">
          <span class="care-sheet-icon" id="care-sheet-icon"></span>
          <span class="care-sheet-title" id="care-sheet-title"></span>
        </div>
        <button class="care-sheet-close" id="care-sheet-close">✕</button>
      </div>
      <div class="care-sheet-body">
        <div class="care-sheet-section">
          <div class="care-sheet-label">마지막 관리일</div>
          <div class="care-sheet-last-date" id="care-sheet-last-date">기록 없음</div>
        </div>
        <div class="care-sheet-section">
          <div class="care-sheet-label">관리 주기</div>
          <div class="care-iv-presets" id="care-iv-presets"></div>
        </div>
        <div class="care-breed-hint" id="care-breed-hint" hidden>
          <span class="care-breed-hint-text" id="care-breed-hint-text"></span>
          <button class="care-breed-hint-apply" id="care-breed-hint-apply">적용</button>
        </div>
        <div class="care-sheet-section care-sheet-section--row">
          <label class="care-sheet-label" for="care-sheet-notify" style="cursor:pointer;">📲 푸시 알림</label>
          <label class="toggle-switch">
            <input type="checkbox" id="care-sheet-notify"/>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="care-sheet-footer">
        <div class="care-done-date-row">
          <span class="care-done-date-label">완료 날짜</span>
          <input type="date" class="care-done-date-input" id="care-done-date"/>
        </div>
        <button class="care-sheet-done-btn" id="care-sheet-done-btn">✓ 완료 기록</button>
        <button class="care-sheet-history-btn" id="care-sheet-history-btn">📋 이 항목의 기록 보기</button>
      </div>
    </div>
  </div>

  <!-- 하단 탭바: 심플 MVP 방침으로 숨김 (커뮤니티/마이 진입점 제거) -->
  <nav class="bottom-tab-bar" aria-label="하단 탭 메뉴" hidden>
    <button class="tab-item is-active" aria-label="케어" aria-current="page">
      <span class="tab-item-icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1" ry="1"/><path d="M9 12l2 2 4-4"/></svg></span>
      <span>케어</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="auth.js" defer></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script src="care.js" defer></script>
</body>
</html>
