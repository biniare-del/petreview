<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>단골병원 관리 – 우쭈쭈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
  <link rel="preconnect" href="https://hguzornmqxayylmagook.supabase.co"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="/petreview/manifest.json"/>
  <meta name="theme-color" content="#16a34a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="우쭈쭈"/>
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg"/>
</head>
<body style="background:#faf7f5;min-height:100vh;padding-bottom:32px;">

  <!-- 헤더 -->
  <header class="site-header" style="position:sticky;top:0;z-index:20;">
    <button onclick="history.back()" style="background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;color:#444;line-height:1;">‹</button>
    <div style="flex:1;margin-left:4px;"><h1 style="font-size:17px;margin:0;">🏥 단골병원 관리</h1></div>
    <button class="hospital-add-btn" id="hospital-add-btn">+ 추가</button>
  </header>

  <div style="max-width:600px;margin:0 auto;padding:16px 12px;">
    <div id="hospital-list">
      <p class="placeholder-text" style="padding:48px 0;">불러오는 중...</p>
    </div>
  </div>

  <!-- 병원 추가/수정 모달 -->
  <div class="modal-overlay" id="hospital-form-overlay" hidden>
    <div class="modal">
      <button class="modal-close" id="hospital-form-close" style="float:right;background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;">✕</button>
      <h3 class="modal-title" id="hospital-form-title">병원 추가</h3>
      <div class="modal-field">
        <label>병원 이름 *</label>
        <input type="text" id="h-name" class="diet-input" placeholder="예: 행복 동물병원" maxlength="50" style="width:100%;"/>
      </div>
      <div class="modal-field">
        <label>종류</label>
        <select id="h-category" class="diet-input" style="width:100%;">
          <option value="동물병원">동물병원</option>
          <option value="24시간 동물병원">24시간 동물병원</option>
          <option value="전문병원">전문병원</option>
          <option value="미용샵">미용샵</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="modal-field">
        <label>주소</label>
        <input type="text" id="h-address" class="diet-input" placeholder="예: 서울 강남구 테헤란로 123" maxlength="100" style="width:100%;"/>
      </div>
      <div class="modal-field">
        <label>전화번호</label>
        <input type="tel" id="h-phone" class="diet-input" placeholder="02-0000-0000" maxlength="20" style="width:100%;"/>
      </div>
      <div class="modal-field">
        <label>메모</label>
        <textarea id="h-memo" class="diet-input" rows="2" placeholder="특이사항, 담당 수의사 등" style="width:100%;resize:none;"></textarea>
      </div>
      <button class="care-sheet-done-btn" id="hospital-form-save" style="margin-top:12px;">저장</button>
      <p id="hospital-form-error" style="color:#e57373;font-size:12px;text-align:center;margin-top:6px;"></p>
    </div>
  </div>

  <!-- 방문 기록 추가 모달 -->
  <div class="modal-overlay" id="visit-form-overlay" hidden>
    <div class="modal">
      <button class="modal-close" id="visit-form-close" style="float:right;background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;">✕</button>
      <h3 class="modal-title">방문 기록</h3>
      <div id="visit-hospital-name" style="font-size:13px;color:#888;margin-bottom:14px;"></div>
      <div class="modal-field">
        <label>방문일 *</label>
        <input type="date" id="v-date" class="diet-input" style="width:100%;"/>
      </div>
      <div class="modal-field">
        <label>진료비 (원)</label>
        <input type="number" id="v-cost" class="diet-input" placeholder="30000" min="0" step="100" style="width:100%;"/>
      </div>
      <div class="modal-field">
        <label>내용</label>
        <textarea id="v-content" class="diet-input" rows="3" placeholder="예: 광견병 접종, 링거 처방 등" style="width:100%;resize:none;"></textarea>
      </div>
      <div class="modal-field">
        <label>담당 수의사</label>
        <input type="text" id="v-vet" class="diet-input" placeholder="예: 홍길동 원장님" maxlength="30" style="width:100%;"/>
      </div>
      <button class="care-sheet-done-btn" id="visit-form-save" style="margin-top:12px;">저장</button>
    </div>
  </div>

  <!-- 병원 상세 슬라이드업 -->
  <div class="care-sheet-overlay" id="hospital-detail-overlay">
    <div class="care-sheet" id="hospital-detail-sheet">
      <div class="care-sheet-handle"></div>
      <div class="care-sheet-header">
        <div class="care-sheet-title-row">
          <span class="care-sheet-icon">🏥</span>
          <span class="care-sheet-title" id="hd-name"></span>
        </div>
        <button class="care-sheet-close" id="hospital-detail-close">✕</button>
      </div>
      <div id="hospital-detail-content" style="padding:0 20px 20px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="supabase-client.js" defer></script>
  <script src="auth.js" defer></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script src="hospital.js" defer></script>
</body>
</html>
