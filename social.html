<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>소셜 – 우쭈쭈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/petreview/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="우쭈쭈" />
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg" />
</head>
<body class="has-tabbar social-page">

  <!-- 사이트 헤더 -->
  <header class="site-header">
    <div class="logo-area">
      <div class="logo-icon">🐾</div>
      <div class="logo-text"><h1>우쭈쭈</h1></div>
    </div>
    <div class="header-auth" id="header-auth">
      <button class="auth-login-btn" id="social-login-btn" hidden onclick="window.PetAuth?.signInWithGoogle()">로그인</button>
    </div>
  </header>

  <!-- 태그 필터 바 (sticky) -->
  <div class="social-tag-bar" id="tag-filter-bar">
    <button class="social-tag-btn is-active" data-tag="전체">전체</button>
    <button class="social-tag-btn" data-tag="사진자랑">📸 사진자랑</button>
    <button class="social-tag-btn" data-tag="병원추천">🏥 병원추천</button>
    <button class="social-tag-btn" data-tag="질문">❓ 질문</button>
    <button class="social-tag-btn" data-tag="정보">💡 정보</button>
    <button class="social-tag-btn" data-tag="일상">💬 일상</button>
  </div>

  <!-- 커뮤니티 피드 -->
  <main class="social-feed" id="post-list">
    <p class="placeholder-text">게시글을 불러오는 중...</p>
  </main>

  <!-- 글 상세 모달 -->
  <div class="social-modal-overlay" id="post-detail-overlay" hidden>
    <div class="social-modal">
      <div class="social-modal-header">
        <h3>게시글</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          <div id="detail-actions"></div>
          <button class="social-modal-close" id="detail-close-btn">✕</button>
        </div>
      </div>
      <div class="post-detail-photos" id="detail-photos" hidden></div>
      <div class="post-detail-body">
        <span class="social-tag-badge" id="detail-tag"></span>
        <p class="detail-title" id="detail-title"></p>
        <p class="detail-meta" id="detail-meta"></p>
        <p class="detail-content" id="detail-content"></p>
        <div id="post-like-area" style="margin-top:16px;"></div>
      </div>
      <div class="comment-section">
        <p class="comment-section-title">댓글 <span id="comment-count">0</span>개</p>
        <div id="comment-list"></div>
        <div id="comment-form-area"></div>
      </div>
    </div>
  </div>

  <!-- 글쓰기 모달 -->
  <div class="social-modal-overlay" id="write-modal-overlay" hidden>
    <div class="social-modal">
      <div class="social-modal-header">
        <h3 id="write-modal-title">글쓰기</h3>
        <button class="social-modal-close" id="write-close-btn">✕</button>
      </div>
      <div class="write-form-body">
        <!-- 사진 첨부 (선택) -->
        <div class="write-photo-area" id="write-photo-area">
          <div class="write-photo-placeholder" id="write-photo-placeholder">
            <span style="font-size:24px;">📷</span>
            <span>사진 첨부 (선택, 최대 3장)</span>
            <input type="file" id="write-photo-input" accept="image/*" multiple style="display:none"/>
          </div>
          <div class="write-photo-previews" id="write-photo-previews" hidden></div>
        </div>
        <!-- 태그 선택 -->
        <div class="write-tag-group" id="tag-select-group">
          <button type="button" class="write-tag-btn" data-tag="사진자랑">📸 사진자랑</button>
          <button type="button" class="write-tag-btn" data-tag="병원추천">🏥 병원추천</button>
          <button type="button" class="write-tag-btn" data-tag="질문">❓ 질문</button>
          <button type="button" class="write-tag-btn" data-tag="정보">💡 정보</button>
          <button type="button" class="write-tag-btn" data-tag="일상">💬 일상</button>
        </div>
        <input type="text" class="write-title-input" id="write-title" placeholder="제목을 입력하세요" maxlength="100" />
        <textarea class="write-content-input" id="write-content" placeholder="내용을 입력하세요."></textarea>
        <button class="write-submit-btn" id="write-submit-btn">등록하기</button>
        <p id="write-result" style="text-align:center;font-size:13px;margin-top:8px;color:#e57373;"></p>
      </div>
    </div>
  </div>

  <!-- 신고 모달 -->
  <div class="social-modal-overlay" id="report-modal-overlay" hidden>
    <div class="social-modal" style="max-width:360px;">
      <div class="social-modal-header">
        <h3 id="report-modal-title">신고하기</h3>
        <button class="social-modal-close" id="report-modal-close-btn">✕</button>
      </div>
      <div style="padding:0 20px 24px;">
        <p style="font-size:13px;color:#888;margin:0 0 14px;">신고 사유를 선택해주세요.</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <label class="report-reason-row"><input type="radio" name="comm-report-reason" value="허위정보"/> 허위정보</label>
          <label class="report-reason-row"><input type="radio" name="comm-report-reason" value="욕설·비방"/> 욕설·비방</label>
          <label class="report-reason-row"><input type="radio" name="comm-report-reason" value="광고성"/> 광고성 게시물</label>
          <label class="report-reason-row"><input type="radio" name="comm-report-reason" value="기타"/> 기타</label>
        </div>
        <button class="write-submit-btn" id="report-submit-btn" style="margin-top:18px;background:linear-gradient(135deg,#e57373,#ef5350);">신고 접수</button>
        <p id="report-result" style="font-size:12px;color:#888;text-align:center;margin-top:8px;"></p>
      </div>
    </div>
  </div>

  <!-- 라이트박스 -->
  <div class="social-lightbox" id="social-lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <button class="lightbox-prev" id="lightbox-prev">‹</button>
    <img id="lightbox-img" src="" alt="" />
    <button class="lightbox-next" id="lightbox-next">›</button>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <!-- 하단 탭바 -->
  <nav class="bottom-tab-bar" aria-label="하단 탭 메뉴">
    <button class="tab-item" onclick="location.href='care.html'" aria-label="케어">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1" ry="1"/><path d="M9 12l2 2 4-4"/></svg>
      <span>케어</span>
    </button>
    <button class="tab-item is-active" aria-label="소셜">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>소셜</span>
    </button>
    <button class="tab-item tab-item--write" id="global-write-btn" aria-label="쓰기">
      <div class="write-tab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
      <span>쓰기</span>
    </button>
    <button class="tab-item" onclick="location.href='mypage.html'" aria-label="마이">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>마이</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script src="social.js" defer></script>
</body>
</html>
