<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>건의함 – 펫리뷰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/petreview/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="펫리뷰" />
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg" />
  <style>
    .feedback-container { max-width: 600px; margin: 0 auto; padding: 24px 16px 80px; }
    .feedback-container h2 { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
    .feedback-desc { font-size: 14px; color: #888; margin: 0 0 24px; line-height: 1.6; }
    .feedback-form { display: flex; flex-direction: column; gap: 16px; }
    .feedback-category-btns {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .feedback-category-btn {
      padding: 8px 16px; border-radius: 999px; border: 1.5px solid #e0d8d2;
      background: #fff; color: #666; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .feedback-category-btn.is-active {
      border-color: #16a34a; background: #16a34a; color: #fff;
    }
    .feedback-form input[type="text"],
    .feedback-form textarea {
      width: 100%; box-sizing: border-box; padding: 10px 14px;
      border: 1.5px solid #e0d8d2; border-radius: 10px;
      font-size: 14px; font-family: inherit; resize: vertical;
    }
    .feedback-form input[type="text"]:focus,
    .feedback-form textarea:focus {
      outline: none; border-color: #16a34a;
    }
    .feedback-form textarea { min-height: 130px; }
    .feedback-form label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; display: block; }
    .feedback-form .form-group { display: flex; flex-direction: column; gap: 4px; }
    .feedback-info-box {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
      padding: 12px 16px; font-size: 13px; color: #166534; line-height: 1.6;
    }
    #feedback-result { margin-top: 4px; font-size: 14px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="logo-area">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
        <div class="logo-icon">🐾</div>
        <div class="logo-text">
          <h1>펫리뷰</h1>
          <p>영수증으로 인증하는 진짜 동물병원·미용샵 리뷰</p>
        </div>
      </a>
    </div>
    <nav class="site-nav">
      <a href="index.html">홈으로</a>
    </nav>
    <div class="header-auth" id="header-auth">
      <button class="auth-login-btn" onclick="window.location.href='index.html'">로그인</button>
    </div>
    <button class="header-hamburger-btn" id="header-hamburger-btn" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    <div class="header-mobile-nav" id="header-mobile-nav">
      <a href="index.html" class="mobile-nav-link">홈으로</a>
      <div id="mobile-auth-content"></div>
    </div>
  </header>

  <div class="feedback-container">
    <h2>건의함</h2>
    <p class="feedback-desc">기능 제안, 버그 신고, 병원 등록 요청 등 자유롭게 남겨주세요.<br>로그인 없이도 작성할 수 있어요.</p>

    <div class="feedback-info-box" style="margin-bottom:20px;">
      💡 여러분의 건의가 펫리뷰를 더 좋게 만들어요. 어떤 내용이든 환영합니다!
    </div>

    <form class="feedback-form" id="feedback-form">
      <div class="form-group">
        <label>유형 선택 *</label>
        <div class="feedback-category-btns" id="feedback-category-btns">
          <button type="button" class="feedback-category-btn is-active" data-value="기능제안">💡 기능제안</button>
          <button type="button" class="feedback-category-btn" data-value="버그신고">🐛 버그신고</button>
          <button type="button" class="feedback-category-btn" data-value="병원등록요청">🏥 병원등록요청</button>
          <button type="button" class="feedback-category-btn" data-value="기타">💬 기타</button>
        </div>
        <input type="hidden" id="feedback-category" value="기능제안" />
      </div>

      <div class="form-group">
        <label for="feedback-title">제목 *</label>
        <input type="text" id="feedback-title" placeholder="한 줄로 요약해주세요" maxlength="100" required />
      </div>

      <div class="form-group">
        <label for="feedback-content">내용 *</label>
        <textarea id="feedback-content" placeholder="자세히 설명해주시면 반영에 도움이 돼요." maxlength="2000" required></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="primary-btn" id="feedback-submit-btn">건의 남기기</button>
      </div>
      <p id="feedback-result"></p>
    </form>
  </div>

  <footer class="site-footer">
    <small>© 2026 펫리뷰 · 실제 영수증 기반 반려동물 리뷰 플랫폼</small>
    <div style="margin-top:6px;">
      <a href="terms.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">이용약관</a>
      <a href="privacy.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">개인정보처리방침</a>
      <a href="contact.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">문의하기</a>
      <a href="feedback.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">건의함</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script>
    function escH(v) {
      return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }

    // 헤더 인증
    let _hbBound = false;
    function bindHamburger() {
      if (_hbBound) return; _hbBound = true;
      const btn = document.getElementById("header-hamburger-btn");
      const nav = document.getElementById("header-mobile-nav");
      if (!btn || !nav) return;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = nav.classList.toggle("is-open");
        btn.setAttribute("aria-expanded", open);
        btn.textContent = open ? "✕" : "☰";
      });
      document.addEventListener("click", (e) => {
        if (nav.classList.contains("is-open") && !nav.contains(e.target) && e.target !== btn) {
          nav.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
          btn.textContent = "☰";
        }
      });
    }
    function updateHeaderAuth() {
      const area = document.getElementById("header-auth");
      if (!area) return;
      bindHamburger();
      const auth = window.PetAuth;
      if (!auth?.isLoggedIn()) {
        area.innerHTML = `<button class="auth-login-btn" onclick="window.location.href='index.html'">로그인</button>`;
        const el = document.getElementById("mobile-auth-content");
        if (el) el.innerHTML = `<button class="auth-login-btn" onclick="window.location.href='index.html'" style="margin-top:8px;">로그인</button>`;
        return;
      }
      const name = auth.getDisplayName();
      const avatar = auth.getAvatarUrl();
      const avatarHtml = avatar
        ? `<img src="${escH(avatar)}" class="header-avatar" alt="프로필" />`
        : `<span class="header-avatar-placeholder">${escH(name[0] || "?")}</span>`;
      area.innerHTML = `${avatarHtml}<span class="header-username">${escH(name)}</span>`;
      const el = document.getElementById("mobile-auth-content");
      if (el) el.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0e8e2;">
          ${avatarHtml}<span style="font-weight:600;font-size:14px;">${escH(name)}</span>
        </div>`;
    }
    window.PetAuth?.init(() => updateHeaderAuth())
      .then(() => updateHeaderAuth())
      .catch(() => {});

    // 카테고리 버튼
    const categoryInput = document.getElementById("feedback-category");
    document.getElementById("feedback-category-btns")?.addEventListener("click", (e) => {
      const btn = e.target.closest(".feedback-category-btn");
      if (!btn) return;
      document.querySelectorAll(".feedback-category-btn").forEach((b) => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      categoryInput.value = btn.dataset.value;
    });

    // 폼 제출
    (function () {
      const form = document.getElementById("feedback-form");
      const submitBtn = document.getElementById("feedback-submit-btn");
      const resultEl = document.getElementById("feedback-result");

      form?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const category = document.getElementById("feedback-category").value;
        const title    = document.getElementById("feedback-title").value.trim();
        const content  = document.getElementById("feedback-content").value.trim();
        if (!title || !content) return;

        submitBtn.disabled = true;
        submitBtn.textContent = "접수 중...";
        resultEl.textContent = "";

        const db = window.supabaseClient;
        if (!db) {
          resultEl.style.color = "#e57373";
          resultEl.textContent = "서비스 연결에 실패했습니다. 잠시 후 다시 시도해주세요.";
          submitBtn.disabled = false;
          submitBtn.textContent = "건의 남기기";
          return;
        }

        const userId = window.PetAuth?.currentUser?.id ?? null;
        const { error } = await db.from("feedbacks").insert([{ category, title, content, user_id: userId }]);

        if (error) {
          resultEl.style.color = "#e57373";
          resultEl.textContent = "접수 중 오류가 발생했습니다. 다시 시도해주세요.";
        } else {
          form.reset();
          document.querySelectorAll(".feedback-category-btn").forEach((b) => b.classList.remove("is-active"));
          document.querySelector('.feedback-category-btn[data-value="기능제안"]')?.classList.add("is-active");
          categoryInput.value = "기능제안";
          resultEl.style.color = "#22c55e";
          resultEl.textContent = "건의가 접수되었습니다. 감사합니다!";
        }

        submitBtn.disabled = false;
        submitBtn.textContent = "건의 남기기";
      });
    })();
  </script>
</body>
</html>
