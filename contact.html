<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>문의하기 – 펫리뷰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/petreview/manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="펫리뷰" />
  <link rel="apple-touch-icon" href="/petreview/icons/icon-192.svg" />
</head>
<body>
  <header class="site-header">
    <div class="logo-area">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
        <div class="logo-icon">🐾</div>
        <div class="logo-text">
          <h1>펫리뷰</h1>
          <p>영수증으로 인증하는 진짜 동물병원·미용샵 리뷰</p>
        </div>
      </a>
    </div>
    <nav class="site-nav">
      <a href="index.html">홈으로</a>
    </nav>
    <div class="header-auth" id="header-auth">
      <button class="auth-login-btn" onclick="window.location.href='index.html'">로그인</button>
    </div>
    <button class="header-hamburger-btn" id="header-hamburger-btn" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    <div class="header-mobile-nav" id="header-mobile-nav">
      <a href="index.html" class="mobile-nav-link">홈으로</a>
      <div id="mobile-auth-content"></div>
    </div>
  </header>

  <div class="contact-container">
    <h2>문의하기</h2>
    <p class="contact-desc">서비스 관련 문의, 병원 제보, 광고 문의 등을 남겨주세요. 확인 후 이메일로 답변드립니다.</p>

    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label for="contact-type">문의 유형 *</label>
        <select id="contact-type" required>
          <option value="" disabled selected>선택해주세요</option>
          <option value="서비스문의">서비스 문의</option>
          <option value="병원제보">병원 제보</option>
          <option value="광고문의">광고 문의</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label for="contact-name">이름 *</label>
        <input type="text" id="contact-name" placeholder="홍길동" required maxlength="50" />
      </div>
      <div class="form-group">
        <label for="contact-email">이메일 *</label>
        <input type="email" id="contact-email" placeholder="example@email.com" required maxlength="100" />
      </div>
      <div class="form-group">
        <label for="contact-content">내용 *</label>
        <textarea id="contact-content" placeholder="문의 내용을 입력해주세요." required maxlength="2000"></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="primary-btn" id="contact-submit-btn">문의 접수하기</button>
      </div>
      <p id="contact-result" style="margin-top:12px;font-size:14px;text-align:center;"></p>
    </form>
  </div>

  <footer class="site-footer">
    <small>© 2026 펫리뷰 · 실제 영수증 기반 반려동물 리뷰 플랫폼</small>
    <div style="margin-top:6px;">
      <a href="terms.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">이용약관</a>
      <a href="privacy.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">개인정보처리방침</a>
      <a href="contact.html" style="color:#aaa;font-size:12px;text-decoration:none;margin:0 8px;">문의하기</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script>if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/petreview/sw.js").catch(() => {}); }</script>
  <script>
    function escH(v) {
      return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }
    let _hbBound = false;
    function bindHamburger() {
      if (_hbBound) return;
      const btn = document.getElementById("header-hamburger-btn");
      const nav = document.getElementById("header-mobile-nav");
      if (!btn || !nav) return;
      _hbBound = true;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = nav.classList.toggle("is-open");
        btn.setAttribute("aria-expanded", open);
        btn.textContent = open ? "✕" : "☰";
      });
      document.addEventListener("click", (e) => {
        if (nav.classList.contains("is-open") && !nav.contains(e.target) && e.target !== btn) {
          nav.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
          btn.textContent = "☰";
        }
      });
    }
    function updateContactHeaderAuth() {
      const area = document.getElementById("header-auth");
      if (!area) return;
      bindHamburger();
      const auth = window.PetAuth;
      if (!auth?.isLoggedIn()) {
        area.innerHTML = `<button class="auth-login-btn" onclick="window.location.href='index.html'">로그인</button>`;
        const el = document.getElementById("mobile-auth-content");
        if (el) el.innerHTML = `<button class="auth-login-btn" onclick="window.location.href='index.html'" style="margin-top:8px;">로그인</button>`;
        return;
      }
      const name = auth.getDisplayName();
      const avatar = auth.getAvatarUrl();
      const avatarHtml = avatar
        ? `<img src="${escH(avatar)}" class="header-avatar" alt="프로필" />`
        : `<span class="header-avatar-placeholder">${escH(name[0] || "?")}</span>`;
      area.innerHTML = `${avatarHtml}<span class="header-username">${escH(name)}</span>`;
      const el = document.getElementById("mobile-auth-content");
      if (el) el.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0e8e2;">
          ${avatarHtml}<span style="font-weight:600;font-size:14px;">${escH(name)}</span>
        </div>`;
    }
    window.PetAuth?.init((event) => { updateContactHeaderAuth(); })
      .then(() => updateContactHeaderAuth())
      .catch(() => {});
  </script>
  <script>
    (function () {
      const form = document.getElementById("contact-form");
      const submitBtn = document.getElementById("contact-submit-btn");
      const resultEl = document.getElementById("contact-result");

      form?.addEventListener("submit", async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = "접수 중...";
        resultEl.textContent = "";

        const type    = document.getElementById("contact-type").value;
        const name    = document.getElementById("contact-name").value.trim();
        const email   = document.getElementById("contact-email").value.trim();
        const content = document.getElementById("contact-content").value.trim();

        const db = window.supabaseClient;
        if (!db) {
          resultEl.style.color = "#e57373";
          resultEl.textContent = "서비스 연결에 실패했습니다. 잠시 후 다시 시도해주세요.";
          submitBtn.disabled = false;
          submitBtn.textContent = "문의 접수하기";
          return;
        }

        const { error } = await db.from("contacts").insert([{ type, name, email, content }]);
        if (error) {
          resultEl.style.color = "#e57373";
          resultEl.textContent = "접수 중 오류가 발생했습니다. 다시 시도해주세요.";
        } else {
          form.reset();
          resultEl.style.color = "#22c55e";
          resultEl.textContent = "문의가 접수되었습니다. 빠른 시일 내에 답변드리겠습니다.";
        }

        submitBtn.disabled = false;
        submitBtn.textContent = "문의 접수하기";
      });
    })();
  </script>
</body>
</html>
