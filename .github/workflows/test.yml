name: Petreview Test Agent

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: '테스트 모드 (code/browser/db/ideas, 비워두면 전체)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: test-agent/package-lock.json

      - name: 의존성 설치
        run: npm install
        working-directory: test-agent

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps
        working-directory: test-agent

      - name: 테스트 에이전트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_EMAIL:        ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD:     ${{ secrets.TEST_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -n "$MODE" ]; then
            node index.js --$MODE
          else
            node index.js
          fi
        working-directory: test-agent

      - name: 결과 아티팩트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-screenshots
          path: test-agent/screenshots/
          retention-days: 7
